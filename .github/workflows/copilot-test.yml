name: Copilot Prompt - JIRA Webhook Trigger

# Triggered via JIRA webhook using the repository_dispatch event.
# Configure your JIRA automation to POST to:
#   https://api.github.com/repos/<owner>/<repo>/dispatches
# with a payload like:
#   {
#     "event_type": "jira-copilot-prompt",
#     "client_payload": {
#       "prompt": "As a mortgage broker I want to search policies by loan ID",
#       "jira_issue": "ALMI-123"
#     }
#   }

on:
  repository_dispatch:
    types:
      - jira-copilot-prompt

  workflow_dispatch:
    inputs:
      prompt:
        description: 'Prompt to send to GitHub Copilot'
        required: true
      jira_issue:
        description: 'JIRA issue key (e.g. ALMI-123)'
        required: false

permissions:
  contents: read

jobs:
  run-copilot-prompt:
    name: Run Copilot Prompt
    runs-on: ubuntu-latest

    env:
      PROMPT: ${{ github.event.client_payload.prompt || inputs.prompt }}
      JIRA_ISSUE: ${{ github.event.client_payload.jira_issue || inputs.jira_issue }}

    steps:
      # - name: Checkout
      #   uses: actions/checkout@v6
      #   with:
      #     fetch-depth: 0

      # - name: Setup Node.js environment
      #   uses: actions/setup-node@v6.4.0
      #   with:
      #     node-version: '22'

      # - name: Install Copilot CLI
      #   run: |
      #     node -v
      #     npm install -g copilot

      # - name: Run Copilot CLI
      #   env:
      #     COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
      #   run: |
      #     copilot -p "${{ github.event.client_payload.prompt || inputs.prompt }}  for the JIRA issue ${{ github.event.client_payload.jira_issue }} "
      - name: Create issue to trigger agent
        env:
           COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
           GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Run architecture review" \
            --body "@copilot run architecture validation on latest code"
          
