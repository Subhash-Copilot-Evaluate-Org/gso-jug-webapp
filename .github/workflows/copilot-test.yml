name: Copilot Prompt - JIRA Webhook Trigger

# Triggered via JIRA webhook using the repository_dispatch event.
# Configure your JIRA automation to POST to:
#   https://api.github.com/repos/<owner>/<repo>/dispatches
# with a payload like:
#   {
#     "event_type": "jira-copilot-prompt",
#     "client_payload": {
#       "prompt": "As a mortgage broker I want to search policies by loan ID",
#       "jira_issue": "ALMI-123"
#     }
#   }

on:
  repository_dispatch:
    types:
      - jira-copilot-prompt

  workflow_dispatch:
    inputs:
      prompt:
        description: 'Prompt to send to GitHub Copilot'
        required: true
      jira_issue:
        description: 'JIRA issue key (e.g. ALMI-123)'
        required: false

permissions:
  contents: read

jobs:
  run-copilot-prompt:
    name: Run Copilot Prompt
    runs-on: ubuntu-latest

    env:
      PROMPT: ${{ github.event.client_payload.prompt || inputs.prompt }}
      JIRA_ISSUE: ${{ github.event.client_payload.jira_issue || inputs.jira_issue }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js environment
        uses: actions/setup-node@v4

      - name: Install Copilot CLI
        run: npm install -g copilot

      - name: Run Copilot CLI
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          copilot -p "Review the git log for this repository and write a bullet point summary of all code changes that were made today, with links to the relevant commit on GitHub. Above the bullet list give a description (max 100 words) summarizing the changes made. Write the details to summary.md" --allow-tool='shell(git:*)' --allow-tool=write --no-ask-user
          cat summary.md >> "$GITHUB_STEP_SUMMARY"
            --url "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${JIRA_ISSUE}/comment" \
            --header "Authorization: Basic ${{ secrets.JIRA_API_TOKEN }}" \
            --header "Content-Type: application/json" \
            --data "{\"body\":{\"type\":\"doc\",\"version\":1,\"content\":[{\"type\":\"paragraph\",\"content\":[{\"type\":\"text\",\"text\":\"Copilot response:\\n${OUTPUT}\\n\\nWorkflow run: ${RUN_URL}\"}]}]}}"
